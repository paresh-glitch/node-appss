name: cicd pipelines

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: lint and install
        run: |
          cd app
          npm install
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: install and test
        run: |
          cd app
          npm install
          npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
     - name: build and push
       run: |
         docker build -t ${{ secrets.DOCKER_USERNAME }}/node-appss:latest ./app
         docker build -t ${{ secrets.DOCKER_USERNAME }}/node-appss:${{ github.sha }} ./app
         docker push ${{ secrets.DOCKER_USERNAME }}/node-appss:latest
         docker push ${{ secrets.DOCKER_USERNAME }}/node-appss:${{ github.sha }}

  notify-success:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: success()
    steps:
      - name: Notify success
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ *Python Flask pipeline passed!*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "By", "value": "${{ github.actor }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  notify-failure:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: failure()
    steps:
      - name: Notify failure
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ *Python Flask pipeline failed!*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "By", "value": "${{ github.actor }}", "short": true },
                  { "title": "Logs", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
